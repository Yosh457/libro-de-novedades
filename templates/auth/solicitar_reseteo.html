{% extends "base.html" %}
{% block title %}Restablecer Contraseña{% endblock %}
{% block content %}
<div class="w-full max-w-md mx-auto pt-60 pb-12 px-4">
<div class="bg-white p-8 rounded-xl shadow-lg w-full border border-gray-100">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-2">Restablecer Contraseña</h2>
    <p class="text-center text-gray-500 mb-8">Ingresa tu correo y te enviaremos un enlace para recuperarla.</p>
    <form method="post" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
            <input type="email" id="email" name="email" class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required>
        </div>
        <div class="text-center pt-2">
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition duration-200">
                Enviar Enlace
            </button>
        </div>
        <div class="text-center text-sm text-gray-600 mt-6 pt-4 border-t border-gray-100">
            <a href="{{ url_for('auth.login') }}" class="font-medium text-blue-600 hover:text-blue-800 hover:underline">Volver a Inicio de Sesión</a>
        </div>
    </form>
</div>
</div>
{% endblock %}
